<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="index.css">
  <title>Product preview card component</title>
</head>
<body>
  <main class="product-card" aria-label="Product preview card">
    <picture class="product-image-wrapper">
      <source media="(max-width: 650px)" srcset="./images/image-product-mobile.jpg">
      <img class="product-image" src="./images/image-product-desktop.jpg" alt="Gabrielle Essence Eau De Parfum bottle">
    </picture>

    <section class="product-content">
      <p class="product-category">Perfume</p>
      <h1 class="product-title">Gabrielle Essence Eau De Parfum</h1>
      <p class="product-description">
        A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.
      </p>

      <div class="product-pricing">
        <span class="current-price">$149.99</span>
        <span class="old-price">$169.99</span>
      </div>

      <button class="cart-button" type="button">
        <img src="./images/icon-cart.svg" alt="" aria-hidden="true">
        Add to Cart
      </button>
    </section>
  </main>
</body>
</html>
